<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Rawat Shopy ecommerce frontend"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"
    />
    <title>Rawat Shopy</title>

    <style>
      .footer {
        background:
          linear-gradient(180deg, #20242d 0%, #16191f 100%);
        padding: 24px 0 16px;
        margin-top: 12px;
        color: #f8fafc;
      }

      .footer-container {
        max-width: 1180px;
        margin: 0 auto;
        padding: 0 16px;
      }

      .footer-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 24px;
      }

      .footer-col h4 {
        font-size: 16px;
        color: #ffffff;
        text-transform: uppercase;
        margin-bottom: 14px;
        font-weight: 700;
        position: relative;
        letter-spacing: 0.5px;
      }

      .footer-col h4::before {
        content: "";
        position: absolute;
        left: 0;
        bottom: -7px;
        background: linear-gradient(90deg, #ff7a18, #ffb800);
        height: 3px;
        width: 46px;
        border-radius: 999px;
      }

      .footer-col ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .footer-col ul li:not(:last-child) {
        margin-bottom: 8px;
      }

      .footer-col ul li a {
        font-size: 14px;
        color: #cbd5e1;
        text-decoration: none;
        display: inline-block;
        transition: all 0.25s ease;
        word-break: break-word;
      }

      .footer-col ul li a:hover {
        color: #ffffff;
        transform: translateX(4px);
      }

      .social-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 4px;
      }

      .footer-col .social-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 38px;
        width: 38px;
        background-color: rgba(255, 255, 255, 0.12);
        text-decoration: none;
        border-radius: 50%;
        color: white;
        transition: all 0.3s ease;
      }

      .footer-col .social-links a:hover {
        color: #16191f;
        background-color: #ffffff;
        transform: translateY(-2px);
      }

      .footer-bottom {
        margin-top: 20px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
        font-size: 13px;
        color: #94a3b8;
      }

      @media (max-width: 900px) {
        .footer-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 20px;
        }
      }

      @media (max-width: 520px) {
        .footer {
          padding: 20px 0 14px;
        }

        .footer-row {
          grid-template-columns: 1fr;
          gap: 18px;
        }

        .footer-col {
          padding-bottom: 4px;
        }

        .footer-col h4 {
          font-size: 15px;
        }

        .footer-col ul li a {
          font-size: 13px;
        }

        .footer-bottom {
          margin-top: 16px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-row">
          <div class="footer-col">
            <h4>Company</h4>
            <ul>
              <li><a href="#">About Us</a></li>
              <li><a href="#">Our Services</a></li>
              <li><a href="#">Privacy Policy</a></li>
              <li><a href="#">Affiliate Program</a></li>
            </ul>
          </div>

          <div class="footer-col">
            <h4>Get Help</h4>
            <ul>
              <li><a href="#">FAQ</a></li>
              <li><a href="#">Shipping</a></li>
              <li><a href="#">Returns</a></li>
              <li><a href="#">Order Status</a></li>
              <li><a href="#">Payment Options</a></li>
            </ul>
          </div>

          <div class="footer-col">
            <h4>Online Shop</h4>
            <ul>
              <li><a href="#">Watch</a></li>
              <li><a href="#">Bag</a></li>
              <li><a href="#">Shoes</a></li>
              <li><a href="#">Dress</a></li>
              <li><a href="#">More Items</a></li>
            </ul>
          </div>

          <div class="footer-col">
            <h4>Follow Us</h4>
            <div class="social-links">
              <a href="#"><i class="fab fa-facebook-f"></i></a>
              <a href="#"><i class="fab fa-twitter"></i></a>
              <a href="#"><i class="fab fa-instagram"></i></a>
              <a href="#"><i class="fab fa-linkedin-in"></i></a>
            </div>
          </div>
        </div>

        <div class="footer-bottom">© 2026 Rawat Shopy. All rights reserved.</div>
      </div>
    </footer>
  </body>
</html>
